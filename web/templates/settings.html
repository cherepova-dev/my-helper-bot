{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block top_title %}Настройки{% endblock %}
{% block content %}
<h1 class="page-heading">Настройки</h1>

<form method="post" action="/settings" class="card stack-form settings-form">
  <h2 class="home-section-title">Время и отчёты</h2>
  <label class="settings-field">
    <span class="settings-label">Часовой пояс</span>
    <span class="muted settings-hint">IANA-имя (как в списке ниже). От него зависят «сегодня», отчёты и календарная неделя. Можно подставить часовой пояс браузера кнопкой ниже.</span>
    <input type="text" id="settings-timezone-input" name="timezone" value="{{ timezone_current }}" maxlength="80" autocomplete="off" class="composer-input" list="tz-examples" placeholder="Europe/Berlin">
    <button type="button" class="btn-secondary settings-tz-device" id="settings-tz-from-device">Подставить с устройства</button>
    <datalist id="tz-examples">
      {% for tz in timezone_examples %}
      <option value="{{ tz }}"></option>
      {% endfor %}
    </datalist>
  </label>
  {% if request.state.is_admin %}
  <h2 class="home-section-title">Планирование</h2>
  <label class="settings-field">
    <span class="settings-label">Начало дня в планировщике</span>
    <span class="muted settings-hint">С какого времени рисуется сетка и откуда ставятся автослоты для задач только с оценкой минут (без точного времени и без блока утро/день/вечер). По умолчанию 9:00.</span>
    <input type="time" name="plan_grid_start" step="300" value="{{ plan_grid_start_value }}" class="composer-input input-narrow" aria-label="Начало сетки плана">
  </label>
  {% endif %}
  <label class="settings-field">
    <span class="settings-label">Максимум задач в день</span>
    <span class="muted settings-hint">При автоподборе даты новые задачи попадают на первый день, где активных задач меньше этого числа (по умолчанию 7).</span>
    <input type="number" name="max_tasks_per_day" min="1" max="50" value="{{ max_tasks_per_day }}" required class="composer-input input-narrow">
  </label>
  <button type="submit" class="btn-primary">Сохранить</button>
</form>
<script>
(function () {
  var btn = document.getElementById("settings-tz-from-device");
  var inp = document.getElementById("settings-timezone-input");
  if (!btn || !inp) return;
  btn.addEventListener("click", function () {
    try {
      var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      if (tz) inp.value = tz;
    } catch (e) {}
  });
})();
</script>
{% endblock %}
